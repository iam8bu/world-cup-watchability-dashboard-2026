name: Update World Cup Odds Dashboard

on:
  workflow_dispatch:  # manual trigger only

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests scipy statsmodels pandas numpy

      - name: Fetch latest odds
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python fetch_odds.py

      - name: Update SPI ratings and tournament simulation
        run: python spi_model.py
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp odds.db /tmp/fresh_odds.db
          git checkout -- odds.db
          git pull --rebase origin main
          cp /tmp/fresh_odds.db odds.db
          python build_dashboard.py
          git add index.html odds.db spi_ratings.db
          git diff --cached --quiet || git commit -m "chore: update odds $(date -u '+%Y-%m-%d')"
          git push
